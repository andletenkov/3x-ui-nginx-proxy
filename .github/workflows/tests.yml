name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bats:
    name: Bats unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          ignore_paths: 'tests'

      - name: Make scripts executable
        run: chmod +x setup.sh harden-host.sh

      - name: Bash syntax check
        run: bash -n setup.sh && bash -n harden-host.sh

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Make stubs executable
        run: chmod +x tests/stubs/*

      - name: Run tests
        run: bats tests/install.bats tests/anonymize.bats

  # The E2E smoke-test tier (tests/e2e/) is intentionally NOT run here. It
  # installs and boots real external systems (3x-ui, nginx.org packages, a
  # real Caddy/forwardproxy binary, real xray-core/hysteria/mieru clients)
  # inside a privileged, systemd-booted Docker container -- slow, occasionally
  # network-flaky, and requiring --privileged Docker support this shared
  # runner tier doesn't reliably provide. It's a manual, local-only
  # verification step: see tests/e2e/README.md for how and when to run it.
