name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bats:
    name: Bats unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          ignore_paths: 'tests'

      - name: Make scripts executable
        run: chmod +x setup.sh setup-3x-ui.sh harden-host.sh

      - name: Bash syntax check
        run: bash -n setup.sh && bash -n setup-3x-ui.sh && bash -n harden-host.sh

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Make stubs executable
        run: chmod +x tests/stubs/*

      - name: Run tests
        run: bats tests/install.bats tests/anonymize.bats
